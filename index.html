<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Виталий Азаров — портфолио</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 16px;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    p {
      margin-bottom: 12px;
      line-height: 1.5;
      font-size: 0.98rem;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 16px;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    @media (max-width: 480px) {
      .card {
        padding: 20px 16px;
      }

      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Виталий Азаров</h1>
    <p class="subtitle">Пентестер и разработчик</p>
    <p>Люблю ковырять бэкенд, Spring, Python, Linux и безопасность. Делаю лендинги и помогаю находить уязвимости до того, как их найдут другие.</p>
    <a class="btn" href="/landings/">Мои лендинги</a>
  </main>
</body>
</html>
