<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет | Авторизация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <section class="login">
      <div class="login__card">
        <div class="login__img">
          <img src="./img/logo.svg" alt="Логотип сервиса" class="login__logo" />
        </div>

        <div class="login__inner">
          <h1>Вход в систему</h1>
          <p>
            Используйте корпоративный аккаунт, чтобы попасть в панель управления.
          </p>

          <form class="login__form" action="#" method="post">
            <div class="login__item">
              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                required
              />
              <label>E‑mail</label>
            </div>

            <div class="login__item">
              <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
              />
              <label>Пароль</label>
            </div>

            <div class="login__btn">
              <button class="btn" type="submit">
                Войти
              </button>
            </div>

            <a href="#" class="login__register">
              Забыли пароль или нет доступа к аккаунту?
            </a>
          </form>
        </div>
      </div>
    </section>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
