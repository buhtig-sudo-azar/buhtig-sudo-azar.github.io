<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет | Авторизация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <section class="login">
      <div class="login__wrapper">
        <div class="login__logo">
          <img src="./img/logo.svg" alt="Логотип сервиса" />
        </div>

        <h1 class="login__title">Вход в систему</h1>
        <p class="login__subtitle">
          Используйте корпоративный аккаунт, чтобы попасть в панель управления.
        </p>

        <form class="login__form" action="#" method="post">
          <label class="login__field">
            <span class="login__label-text">E‑mail</span>
            <input
              type="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </label>

          <label class="login__field">
            <span class="login__label-text">Пароль</span>
            <input
              type="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </label>

          <button class="login__submit" type="submit">
            Войти
          </button>

          <div class="login__footer">
            <a href="#" class="login__link">Забыли пароль?</a>
            <span class="login__divider">•</span>
            <a href="#" class="login__link">Создать аккаунт</a>
          </div>
        </form>
      </div>
    </section>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
