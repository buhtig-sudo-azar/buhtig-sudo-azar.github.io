<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Личный кабинет | Авторизация</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.8);
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: radial-gradient(circle at top, #22c55e, #16a34a 35%, #14532d 80%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 1px #22c55e40;
    }
    .link-row {
      margin-top: 8px;
      margin-bottom: 18px;
      font-size: 13px;
    }
    .link {
      color: #22c55e;
      text-decoration: none;
    }
    .link:hover {
      text-decoration: underline;
    }
    button {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-label="Логотип сервиса">DG</div>

    <h1>Вход в систему</h1>
    <p class="subtitle">Используйте корпоративный аккаунт, чтобы попасть в панель управления.</p>

    <form onsubmit="return false">
      <div class="field">
        <label for="email">E‑mail</label>
        <input id="email" type="email" required placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" required placeholder="••••••••">
      </div>

      <div class="link-row">
        <a href="#" class="link">Забыли пароль или нет доступа к аккаунту?</a>
      </div>

      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
