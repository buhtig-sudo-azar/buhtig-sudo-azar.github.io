<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Личный кабинет | Авторизация</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #020617;
      border-radius: 16px;
      border: 1px solid #1f2937;
      padding: 24px 20px 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.85);
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: radial-gradient(circle at top, #22c55e, #16a34a 40%, #14532d 85%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .subtitle {
      margin: 0 0 20px;
      font-size: 13px;
      color: #9ca3af;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 10px 11px;
      border-radius: 9px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }

    input::placeholder {
      color: #6b7280;
    }

    input:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 1px #22c55e40;
    }

    .link-row {
      margin-top: 6px;
      margin-bottom: 18px;
      font-size: 13px;
    }

    .link {
      color: #22c55e;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 9px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    button:hover {
      background: #16a34a;
    }

    /* Очень маленькие экраны */
    @media (max-width: 360px) {
      .card {
        padding: 20px 16px 18px;
        border-radius: 12px;
      }
      h1 {
        font-size: 20px;
      }
    }

    /* Чуть побольше, можно центрировать чуть выше */
    @media (min-width: 768px) {
      body {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Форма входа в личный кабинет">
    <div class="logo">DG</div>

    <h1>Вход в систему</h1>
    <p class="subtitle">
      Используйте корпоративный аккаунт, чтобы попасть в панель управления.
    </p>

    <!-- Статичный муляж, без обработки -->
    <div class="field">
      <label for="email">E‑mail</label>
      <input
        id="email"
        type="email"
        value="azarovvvit@mail.ru"
        aria-label="E‑mail"
        placeholder="you@example.com">
    </div>

    <div class="field">
      <label for="password">Пароль</label>
      <input
        id="password"
        type="password"
        value="••••••••••"
        aria-label="Пароль"
        placeholder="••••••••••">
    </div>

    <div class="link-row">
      <a href="#" class="link">Забыли пароль или нет доступа к аккаунту?</a>
    </div>

    <button type="button">Войти</button>
  </main>
</body>
</html>
